# ============================================================================
# Configuration de base du projet Zensical (SANS la navigation)
# La navigation sera injectée depuis les fragments dans config/toml/navigation/.
# ============================================================================

[project]

# Nom du site affiché dans l'en-tête et le titre du navigateur.
site_name = "OmnyDocs"

# Description du site (utilisée par les moteurs de recherche et pour l'OpenGraph).
site_description = """
Cette documentation a pour vocation d'explorer et de transmettre les concepts fondamentaux de l'informatique à travers
une approche claire, structurée et progressive. Elle couvre un large spectre de domaines — du développement web à
l'administration système, en passant par la cybersécurité et le DevSecOps — afin d'offrir à chacun les bases nécessaires
pour comprendre, apprendre et construire des solutions numériques solides et sécurisées.
"""

# Auteur principal de la documentation.
site_author = "Alain GUILLON"

# URL canonique du site en production.
site_url = "https://omnydocs.netlify.app/"

# Mention de droit d'auteur affichée en pied de page (HTML autorisé).
copyright = """
Copyright &copy; 2025/26 - Alain GUILLON
"""

# Répertoire contenant les fichiers Markdown de la documentation.
docs_dir = "docs"

# Fichiers CSS additionnels (chemin relatif à docs_dir).
extra_css = ["assets/stylesheets/extra.css"]

# Fichiers JavaScript additionnels (chemin relatif à docs_dir).
extra_javascript = ["assets/javascripts/extra.js"] # tes composants UI (omny-meta, etc.)

# ============================================================================
# NAVIGATION PRINCIPALE (FRAGMENTS GÉRÉS PAR MAKEFILE)
# Ce bloc ouvre la liste nav = [ ... ] dans la table [project].
# ============================================================================

nav = [
  
  # ===========================================================================
  # 0 — ACCUEIL
  # ===========================================================================
  # Point d'entrée principal de la documentation OmnyDocs.
  # Cette section présente la philosophie du projet, son organisation
  # et guide l'utilisateur vers les différents domaines de connaissance.
  # 
  # PUBLIC CIBLE : Tous publics (débutants à experts)
  # ===========================================================================

    {"Accueil" = [
    # Page d'index principale de la documentation
    "index.md",

    # -------------------------------------------------------------------------
    # Pages introductives
    # Contexte, objectifs et structure de la documentation
    # -------------------------------------------------------------------------

    # Philosophie et approche pédagogique
    {"Préambule" = "home/preambule.md"},

    # Présentation générale et organisation
    {"Introduction" = "home/introduction.md"},

    # -------------------------------------------------------------------------
    # Parcours guidés
    # Pages d'orientation pour aider à choisir un chemin cohérent
    # -------------------------------------------------------------------------
    {"Parcours d'apprentissage" = [

      # Mesurer et visualiser la progression (référentiels internes)
      {"Compréhension"             = "home/comprehension.md"},
      {"Matrice de compétences"    = "home/competences/matrice.md"},
      {"Heatmap de compétences"    = "home/competences/heatmap.md"},
      {"Radar des compétences"     = "home/competences/radar.md"},
  
      {"Parcours" = [
        {"Développeur web"              = "home/parcours/developpeur-web.md"},
        {"Admin Systèmes & Réseaux"     = "home/parcours/admin-sys-reseau.md"},
        {"Sys → Cyber Défense"          = "home/parcours/sys-cyber-defense.md"},
        {"Dev → Cyber Attaque"          = "home/parcours/dev-cyber-attaque.md"},
        {"Double compétence technique"  = "home/parcours/double-competence.md"},
        {"Gouvernance (GRC)"            = "home/parcours/gouvernance.md"},
      ]},
      
    ]},

    # -------------------------------------------------------------------------
    # Référentiel Mermaid (banc de test + patterns)
    # Objectif : valider la compatibilité Zensical + standardiser les usages
    # -------------------------------------------------------------------------
    {"Référentiel Mermaid" = [
      "home/mermaid/index.md",

      # Essentiels (les plus utilisés)
      {"Essentiels" = [
        "home/mermaid/essentiels/flowchart.md",
        "home/mermaid/essentiels/sequence.md",
        {"Séquence (alt/else)"     = "home/mermaid/essentiels/sequence_alt_else.md"},
