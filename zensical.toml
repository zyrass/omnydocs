# ============================================================================
# Configuration du thème, des couleurs, des polices et du rendu Markdown
# ============================================================================

# ----------------------------------------------------------------------------
# Thème principal (logo, variante, langue, comportements, etc.)
# ----------------------------------------------------------------------------
[project.theme]

# Logo affiché dans l'en-tête.
logo = "assets/logo-dark.png"

# Variante du thème (par défaut : "classic").
variant = "classic"

# Favicon (icône de l'onglet du navigateur).
favicon = "assets/images/favicon.png"

# Répertoire des surcharges de templates (Jinja).
custom_dir = "custom"

# Langue utilisée pour l'interface et l'accessibilité.
language = "fr"

# Fonctionnalités activées du thème (navigation, code, recherche, etc.).
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow"
]

# ----------------------------------------------------------------------------
# Palettes de couleurs (clair / sombre)
# ----------------------------------------------------------------------------
[[project.theme.palette]] 
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Change pour le mode sombre"
primary = "deep purple"
accent = "light blue"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Change pour le mode clair"
primary = "light blue"
accent = "deep purple"

# ----------------------------------------------------------------------------
# Polices utilisées pour le texte et le code
# ----------------------------------------------------------------------------
[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

# ----------------------------------------------------------------------------
# Icônes
# ----------------------------------------------------------------------------
[project.theme.icon]
previous = "lucide/square-arrow-left"
next     = "lucide/square-arrow-right"

# ----------------------------------------------------------------------------
# Liens sociaux (GitHub, etc.)
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/zyrass/omnydocs"

# ----------------------------------------------------------------------------
# Bannière de consentement aux cookies
# ----------------------------------------------------------------------------
# [project.extra.consent]
# title = "Consentement aux cookies"
# description = """
# Nous utilisons des cookies afin de reconnaître vos visites récurrentes et vos préférences, d'évaluer l'efficacité de
# notre documentation et de mieux comprendre si vous trouvez les informations que vous recherchez. Avec votre accord,
# ces données nous aident à améliorer continuellement la qualité et la pertinence de notre contenu.
# """
# actions = [
#     "accept",
#     "manage"
# ]

[project.extra]
# Afficher ou non la mention de générateur Zensical en pied de page.
generator = true

# ----------------------------------------------------------------------------
# Statuts personnalisés pour les pages
# ----------------------------------------------------------------------------
[project.extra.status]
deprecated = "Déprécié - Suppression à venir prochainement"
alpha      = "Première ébauche"
beta       = "En cours de révision"
new        = "Nouveautée"
edit       = "En cours de réécriture"

# ----------------------------------------------------------------------------
# Tags / icônes par langage
# ----------------------------------------------------------------------------
[project.theme.icon.tag]
default     = "lucide/hash"
go_tag      = "fontawesome/brands/golang"
python_tag  = "fontawesome/brands/python"
rust_tag    = "fontawesome/brands/rust"
javascript_tag = "fontawesome/brands/js"
php_tag     = "fontawesome/brands/php"

[project.extra.tags]
GO      = "go_tag"
PYTHON  = "python_tag"
RUST    = "rust_tag"
JS      = "javascript_tag"
PHP     = "php_tag"

HTTP          = "default"
API           = "default"
REST          = "default"
SECURITE      = "default"
RESEAU        = "default"
PROTOCOLES    = "default"
TCP           = "default"
UDP           = "default"
STATUT        = "default"
ERREUR        = "default"
UNIX          = "default"
LINUX         = "default"
ARCHITECTURE  = "default"
SYSTEME       = "default"
PHILOSOPHIE   = "default"

[project.extra.javascript]
path = "assets/javascripts/extra.js"
type = "module"
async = true

# ----------------------------------------------------------------------------
# Extensions Markdown (pymdownx, mermaid, etc.)
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums      = true
line_spans           = "__span"
pygments_lang_class  = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

