  # ============================================================================
  # 4 — CYBERSÉCURITÉ : GOUVERNANCE, RISK & COMPLIANCE (GRC)
  # ============================================================================
  # Cette section couvre l’aspect stratégique, juridique et organisationnel
  # de la cybersécurité (GRC).
  #
  # Elle se concentre sur :
  # - conformité réglementaire (RGPD, NIS2, DORA, etc.)
  # - référentiels et normes (ISO 27001, NIST, PCI DSS, SecNumCloud, etc.)
  # - démarche SMSI (pilotage, preuves, audits, amélioration continue)
  # - analyse de risques (EBIOS RM, MEHARI, ISO 27005)
  # - gouvernance documentaire (PSSI, SDSI, BIA)
  # - gestion des vulnérabilités (cadre, métriques, priorisation)
