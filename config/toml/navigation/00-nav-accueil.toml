# ============================================================================
# NAVIGATION PRINCIPALE (FRAGMENTS GÉRÉS PAR MAKEFILE)
# Ce bloc ouvre la liste nav = [ ... ] dans la table [project].
# ============================================================================

nav = [
  
  # ===========================================================================
  # 0 — ACCUEIL
  # ===========================================================================
  # Point d'entrée principal de la documentation OmnyDocs.
  # Cette section présente la philosophie du projet, son organisation
  # et guide l'utilisateur vers les différents domaines de connaissance.
  # 
  # PUBLIC CIBLE : Tous publics (débutants à experts)
  # ===========================================================================

    {"Accueil" = [
    # Page d'index principale de la documentation
    "index.md",

    # -------------------------------------------------------------------------
    # Pages introductives
    # Contexte, objectifs et structure de la documentation
    # -------------------------------------------------------------------------

    # Philosophie et approche pédagogique
    {"Préambule" = "home/preambule.md"},

    # Présentation générale et organisation
    {"Introduction" = "home/introduction.md"},

    # -------------------------------------------------------------------------
    # Parcours guidés
    # Pages d'orientation pour aider à choisir un chemin cohérent
    # -------------------------------------------------------------------------
    {"Parcours d'apprentissage" = [
      {"Compréhension" = "home/comprehension.md"},

      # Mesurer et visualiser la progression (référentiels internes)
      {"Compétences" = [
        {"Matrice de compétences" = "home/competences/matrice.md"},
        {"Heatmap de compétences" = "home/competences/heatmap.md"},
        {"Diagramme radar des compétences" = "home/competences/radar.md"},
      ]},
    ]},

    # -------------------------------------------------------------------------
    # Référentiel Mermaid (banc de test + patterns)
    # Objectif : valider la compatibilité Zensical + standardiser les usages
    # -------------------------------------------------------------------------
    {"Schémas Mermaid (référentiel)" = [
      "home/mermaid/index.md",

      # Essentiels (les plus utilisés)
      {"Essentiels" = [
        {"Flowchart (fondamental)" = "home/mermaid/essentiels/flowchart.md"},
        {"Séquence (fondamental)"  = "home/mermaid/essentiels/sequence.md"},
        {"Séquence (alt/else)"     = "home/mermaid/essentiels/sequence_alt_else.md"},
        {"Flowchart (Subgraph)"    = "home/mermaid/essentiels/flowchart_subgraph.md"},
        {"Flowchart (Styles + Classes)" = "home/mermaid/essentiels/flowchart_styles_classes.md"},
      ]},

      # Modélisation & structure (UML / Data / États)
      {"Modélisation" = [
        {"Class Diagram (UML)" = "home/mermaid/modelisation/class_uml.md"},
        {"ER Diagram (données)" = "home/mermaid/modelisation/er.md"},
        {"State Diagram (cycle de vie)" = "home/mermaid/modelisation/state.md"},
      ]},

      # Pilotage projet / DevOps (temps + Git)
      {"Pilotage & DevOps" = [
        {"Gantt (planning)" = "home/mermaid/pilotage/gantt.md"},
        {"GitGraph (workflow Git)" = "home/mermaid/pilotage/gitgraph.md"},
      ]},

      # Synthèse & narration (communication)
      {"Synthèse" = [
        {"Pie Chart (répartition)" = "home/mermaid/synthese/piechart.md"},
        {"Journey (parcours)" = "home/mermaid/synthese/journey.md"},
      ]},

      # Avancés / support variable (selon version Mermaid/Zensical)
      {"Avancés (support variable)" = [
        {"Mindmap" = "home/mermaid/avances/mindmap.md"},
        {"Timeline" = "home/mermaid/avances/timeline.md"},
        {"Quadrant (priorisation)" = "home/mermaid/avances/quadrant.md"},
        {"Block Diagram" = "home/mermaid/avances/block.md"},
        {"Architecture" = "home/mermaid/avances/architecture.md"},
        {"Radar (compétences)" = "home/mermaid/avances/radar.md"},
        {"XY Chart (beta)" = "home/mermaid/avances/xychart.md"},
        {"ZenUML" = "home/mermaid/avances/zenuml.md"},
      ]},
    ]},

  ]},